<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陸上タイム計測ツール - Manual</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; padding: 20px; box-sizing: border-box; }
        h1 { text-align: center; color: #4fc3f7; }
        .section { background: #111; padding: 20px; border-radius: 20px; margin-bottom: 24px; border: 1px solid #333; }
        .row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        label { font-size: 14px; color: #aaa; }
        button, input, select { padding: 14px; font-size: 16px; border: none; border-radius: 14px; background: #222; color: white; }
        button { cursor: pointer; background: #444; font-weight: bold; }
        #startBtn { background: #e91e63; color: white; font-size: 20px; width: 100%; margin-top: 10px; }
        #startBtn:disabled { background: #555; opacity: 0.6; }
        #status { font-size: 40px; text-align: center; font-weight: bold; min-height: 60px; color: #4caf50; margin: 10px 0; }
        #flash { position: fixed; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 9999; }

        /* 説明用 */
        .guide { font-size: 13px; color: #ccc; line-height: 1.6; }
        .guide b { color: #4fc3f7; }

        /* 解析UI */
        .video-container { width: 100%; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid #444; }
        video { width: 100%; display: block; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 16px; background: #333; border-radius: 8px; margin: 20px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 28px; background: #4fc3f7; border-radius: 50%; border: 2px solid #fff; }
        
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-play { grid-column: span 2; background: #fff; color: #000; }
        .btn-start-mark { background: #2e7d32; }
        .btn-goal-mark { background: #1565c0; }
        
        .record-info { display: flex; justify-content: space-between; margin-top: 15px; background: #222; padding: 10px; border-radius: 10px; font-family: monospace; }
        #result { font-size: 40px; text-align: center; margin-top: 20px; color: #ffeb3b; font-weight: bold; }
    </style>
</head>
<body>

<div id="flash"></div>

<div class="section">
    <h1>陸上タイム計測ツール</h1>
    <div class="guide">
        <b>【使い方】</b><br>
        1. 端末の背面または画面を自分（カメラ）に向けて設置する。<br>
        2. 「START SIGNAL」を押すと「Set」の後に号砲が鳴る。<br>
        3. <b>[号砲・画面発光・背面ライト]</b> が同時に発生し、スタートの瞬間を記録。<br>
        4. 撮影した動画を下の「解析ツール」で読み込み、光った瞬間とゴールを記録する。
    </div>
</div>

<div class="section">
    <div id="status">READY</div>
    <div class="row">
        <label>画面フラッシュを有効にする？</label>
        <select id="screenFlashToggle">
            <option value="on">有効（画面が白く光る）</option>
            <option value="off">無効</option>
        </select>
    </div>
    <div class="row">
        <label>Setから号砲までの方式</label>
        <select id="startMode">
            <option value="random">ランダム (1.5s 〜 3.0s)</option>
            <option value="fixed">固定秒数</option>
        </select>
    </div>
    <div class="row" id="fixedRow" style="display:none;">
        <label>固定秒数 (秒)</label>
        <input type="number" id="fixedDelay" value="2.0" step="0.1">
    </div>
    <div class="row">
        <label>ライトの点灯タイミング調整 (ms)</label>
        <input type="number" id="torchOffset" value="150">
        <small style="color:#777;">号砲より何ミリ秒早くライトを光らせるか調整</small>
    </div>
    <button id="startBtn">START SIGNAL</button>
</div>

<div class="section">
    <h2>解析ツール</h2>
    <div class="row">
        <input type="file" id="videoInput" accept="video/*">
    </div>
    <div class="video-container">
        <video id="video" playsinline></video>
    </div>
    
    <input type="range" id="frameSlider" min="0" value="0">
    
    <div class="controls-grid">
        <button onclick="togglePlay()" id="playBtn" class="btn-play">再生 / 停止</button>
        <button onclick="stepFrame(-1)">◀ 1F戻る</button>
        <button onclick="stepFrame(1)">1F進む ▶</button>
        <button onclick="markStart()" class="btn-start-mark">🟢 スタート点（光）</button>
        <button onclick="markGoal()" class="btn-goal-mark">🏁 ゴール点（通過）</button>
    </div>

    <div class="record-info">
        <div>START: <span id="startFrameText">-</span></div>
        <div>GOAL: <span id="goalFrameText">-</span></div>
    </div>
    <div id="result">0.000 秒</div>
</div>

<script>
let audioCtx = null;
let videoTrack = null;
let startFrameTime = null;
let goalFrameTime = null;

// --- 音響設定（大音量・強化版） ---
function playGunSound() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(2.0, audioCtx.currentTime); // 強めにブースト
    masterGain.connect(audioCtx.destination);

    // 衝撃音（低音）
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(180, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
    oscGain.gain.setValueAtTime(1, audioCtx.currentTime);
    oscGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    osc.connect(oscGain); oscGain.connect(masterGain);
    osc.start(); osc.stop(audioCtx.currentTime + 0.2);

    // 破裂音（ホワイトノイズ）
    const bufferSize = audioCtx.sampleRate * 0.15;
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(1.2, audioCtx.currentTime);
    noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    noise.connect(noiseGain); noiseGain.connect(masterGain);
    noise.start();
}

// --- スタート信号制御 ---
const startBtn = document.getElementById('startBtn');
const flashOverlay = document.getElementById('flash');

startBtn.onclick = async () => {
    startBtn.disabled = true;
    if (!videoTrack) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            videoTrack = stream.getVideoTracks()[0];
        } catch(e) { console.warn("Flashlight not available"); }
    }
    if (!audioCtx) audioCtx = new AudioContext();

    document.getElementById('status').innerText = "SET...";
    const uttr = new SpeechSynthesisUtterance("Set");
    uttr.lang = 'en-US';
    uttr.rate = 0.8;
    window.speechSynthesis.speak(uttr);

    const mode = document.getElementById('startMode').value;
    const offset = parseInt(document.getElementById('torchOffset').value);
    const useScreenFlash = document.getElementById('screenFlashToggle').value === 'on';
    let delay = mode === 'random' ? 1500 + Math.random() * 1500 : parseFloat(document.getElementById('fixedDelay').value) * 1000;

    setTimeout(() => {
        // 先行点灯
        if(videoTrack) videoTrack.applyConstraints({ advanced: [{ torch: true }] });
        
        setTimeout(() => {
            playGunSound();
            document.getElementById('status').innerText = "GO!!";
            if(useScreenFlash) flashOverlay.style.opacity = 1;

            setTimeout(() => {
                flashOverlay.style.opacity = 0;
                if(videoTrack) videoTrack.applyConstraints({ advanced: [{ torch: false }] });
                document.getElementById('status').innerText = "READY";
                startBtn.disabled = false;
            }, 150);
        }, offset);
    }, delay - offset);
};

// --- 解析ビデオ制御 ---
const video = document.getElementById('video');
const slider = document.getElementById('frameSlider');

document.getElementById('videoInput').onchange = e => {
    const file = e.target.files[0];
    if (file) {
        video.src = URL.createObjectURL(file);
        startFrameTime = null; goalFrameTime = null;
        document.getElementById('startFrameText').innerText = "-";
        document.getElementById('goalFrameText').innerText = "-";
        document.getElementById('result').innerText = "0.000 秒";
    }
};

video.onloadedmetadata = () => { slider.max = video.duration * 1000; };
video.ontimeupdate = () => { if (!video.paused) slider.value = video.currentTime * 1000; };
slider.oninput = () => { video.pause(); video.currentTime = slider.value / 1000; };

function togglePlay() { video.paused ? video.play() : video.pause(); }
function stepFrame(dir) { video.pause(); video.currentTime += dir * (1 / 60); slider.value = video.currentTime * 1000; }

function markStart() {
    startFrameTime = video.currentTime;
    document.getElementById('startFrameText').innerText = startFrameTime.toFixed(3) + "s";
    calculateTime();
}

function markGoal() {
    goalFrameTime = video.currentTime;
    document.getElementById('goalFrameText').innerText = goalFrameTime.toFixed(3) + "s";
    calculateTime();
}

function calculateTime() {
    if (startFrameTime !== null && goalFrameTime !== null) {
        document.getElementById('result').innerText = Math.abs(goalFrameTime - startFrameTime).toFixed(3) + " 秒";
    }
}

document.getElementById('startMode').onchange = (e) => {
    document.getElementById('fixedRow').style.display = e.target.value === 'fixed' ? 'flex' : 'none';
};
</script>
</body>
</html>
